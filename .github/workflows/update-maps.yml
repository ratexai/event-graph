name: Update Prediction Maps

on:
  schedule:
    - cron: '0 6,18 * * *'  # 2x/day at 06:00 and 18:00 UTC
  workflow_dispatch:          # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r radiant/requirements.txt

      - name: Update all maps
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: radiant/agents
        run: python update_map.py --all

      - name: Commit updated data
        run: |
          git config user.name "Radiant Agent"
          git config user.email "agent@ratexai.com"
          git add radiant/data/
          git diff --staged --quiet || git commit -m "auto-update maps $(date -u +%Y-%m-%d_%H:%M)"
          git push
